<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Retail Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-dark: #f5f5f5;
        --bg-panel: #ffffff;
        --text-main: #2c2c2c;
        --text-muted: #888888;
        --border: #e9ecef;
        --accent: #0d99ff;
        --purple-grad: linear-gradient(135deg, #0d99ff 0%, #58bad7 100%);
    }
    * { box-sizing: border-box; }
    body { background-color: var(--bg-panel); color: var(--text-main); font-family: 'Poppins', ui-sans-serif, system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; }
    .auth-wrapper { display: flex; min-height: 100vh; }
    .auth-info {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px;
      background: var(--bg-dark);
      text-align: center;
    }
    .auth-info .illus { width: 260px; height: 260px; margin: 0 auto 28px; }
    .auth-info h1 { font-size: 24px; font-weight: 800; letter-spacing: .03em; margin: 0 0 10px; color: var(--text-main); }
    .auth-info p { font-size: 13.5px; color: var(--text-muted); max-width: 320px; margin: 0 auto; line-height: 1.6; }
    .auth-info .stat-row { display: flex; gap: 28px; margin-top: 32px; }
    .auth-info .stat-row div { text-align: center; }
    .auth-info .stat-row .n { font-size: 19px; font-weight: 700; color: var(--accent); }
    .auth-info .stat-row .l { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
    .auth-form-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; background: #ffffff; }
    .auth-form-inner { width: 100%; max-width: 340px; }
    .input-field { width: 100%; background-color: #ffffff; border: 1px solid var(--border); color: var(--text-main); padding: 11px 14px; border-radius: 0.5rem; margin-top: 6px; margin-bottom: 18px; font-family: inherit; font-size: 14px; }
    .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,153,255,.12); }
    .input-field::placeholder { color: #bbbbbb; }
    label.field-label { font-size: 12.5px; font-weight: 600; color: var(--text-main); }
    .btn-primary { width: 100%; padding: 12px; border-radius: 0.5rem; background: var(--purple-grad); color: #ffffff; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; font-size: 14px; box-shadow: 0 8px 20px rgba(13, 153, 255, 0.25); }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    @media (max-width: 900px) { .auth-info { display: none; } }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-info">
      <div>
        <svg class="illus" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="120" cy="120" r="110" fill="#e2f3ff"/>
          <rect x="55" y="120" width="28" height="70" rx="4" fill="#0d99ff"/>
          <rect x="95" y="95" width="28" height="95" rx="4" fill="#58bad7"/>
          <rect x="135" y="70" width="28" height="120" rx="4" fill="#3ac977"/>
          <path d="M55 108L95 84L135 60L175 40" stroke="#2c2c2c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="175" cy="40" r="7" fill="#ff9f00"/>
          <rect x="45" y="190" width="150" height="10" rx="5" fill="#dbe2e8"/>
          <circle cx="185" cy="95" r="16" fill="#ffffff" stroke="#0d99ff" stroke-width="3"/>
          <path d="M179 95L184 100L192 90" stroke="#0d99ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>RETAIL SUPPORT</h1>
        <p>Dashboard CRM untuk memantau kunjungan toko, aktivitas sales, dan laporan intelejen kompetitor secara real-time.</p>
        <div class="stat-row">
          <div><div class="n">3</div><div class="l">Role Akses</div></div>
          <div><div class="n">6</div><div class="l">Modul</div></div>
          <div><div class="n">Live</div><div class="l">Sync Sheet</div></div>
        </div>
      </div>
    </div>

    <div class="auth-form-wrap">
      <div class="auth-form-inner">
        <div class="mb-8">
            <h1 class="text-2xl font-bold tracking-wide text-[var(--text-main)] mb-1">Masuk ke Akun</h1>
            <p class="text-xs text-[var(--text-muted)]">CRM System &mdash; Manager &amp; Sales Edition</p>
        </div>

        <form id="loginForm">
          <label class="field-label">USER ID</label><br>
          <input type="text" id="userId" class="input-field" required placeholder="Masukkan ID Account..." autocomplete="off">

          <label class="field-label">PASSWORD</label><br>
          <input type="password" id="userPass" class="input-field" required placeholder="Masukkan Password...">

          <div id="errorMsg" class="bg-red-50 border border-red-200 text-red-600 text-xs p-3 rounded mb-4 hidden text-center">
            ❌ USER ID atau Password salah!
          </div>

          <button type="submit" class="btn-primary mt-2">LOGIN KE SISTEM</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Cek jika user sudah login, langsung lempar ke utama.html
    if(sessionStorage.getItem('crm_logged_in_role')) {
        window.location.href = 'utama.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('userId').value.trim();
      const pass = document.getElementById('userPass').value.trim();
      let role = '';

      // Hardcode Database Account sesuai permintaan
      if (id === 'SMNW01' && pass === '1234') {
          role = 'Sales Manager';
      } else if (id === 'RFSNW01' && pass === '1234') {
          role = 'RFS Ali';
      } else if (id === 'AERNW01' && pass === '1234') {
          role = 'AER Thia';
      }

      if (role !== '') {
        // Set sesi dan arahkan ke halaman utama
        sessionStorage.setItem('crm_logged_in_role', role);
        window.location.href = 'utama.html';
      } else {
        // Munculkan notifikasi error
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
