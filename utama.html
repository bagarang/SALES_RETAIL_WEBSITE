<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Retail Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="db_setup.js"></script>
  <script src="db_toko.js"></script>
  <script src="db_plan.js"></script>
  <script src="db_aktifitas.js"></script>
  <script src="db_intel.js"></script>
  <script src="db-cloud.js"></script>
</head>
<body class="bg-[#1e1b2e] text-white">

  <!-- Script untuk logika otomatis PIC dan KPI -->
  <script>
    // FUNGSI INI ADALAH KUNCI: Dia akan mencari PIC berdasarkan Kontak Toko
    // tanpa perlu data di sheet Aktifitas terisi PIC secara manual.
    function resolvePic(aktifitasObj) {
        if (aktifitasObj.pic && aktifitasObj.pic !== '-') return aktifitasObj.pic;
        const toko = db.toko.find(t => t.kodeKontak === aktifitasObj.kontakToko);
        return toko ? toko.pic : '-';
    }

    // Pengecualian Foto: True jika PIC Ali DAN jenis kunjungan BUKAN Kunjungan Fisik
    function isFotoExempt(pic, jenisKunjungan) {
      return (pic || '').trim() === 'Ali' && (jenisKunjungan || '').trim() !== 'Kunjungan Fisik';
    }

    // Fungsi Render Aktifitas yang sudah diperbaiki
    function renderAktifitas(c) {
      let rows = db.aktifitas.map(a => {
        let picDisplay = resolvePic(a);
        let statusFoto = (a.linkTersedia === 'Melampirkan' || a.linkTersedia === 'Tidak Melampirkan' || a.linkTersedia === 'Tidak Wajib')
          ? a.linkTersedia
          : ((a.linkFoto && a.linkFoto.trim() !== '') ? 'Melampirkan' : 'Tidak Melampirkan');
        
        // Logika Pengecualian KPI Foto
        if (isFotoExempt(picDisplay, a.jenisKunjungan)) {
            statusFoto = 'Tidak Wajib';
        }

        return `<tr>
          <td class="p-2 border-b border-gray-700">${a.kontakToko}</td>
          <td class="p-2 border-b border-gray-700">${a.namaToko}</td>
          <td class="p-2 border-b border-gray-700 font-bold text-yellow-400">${picDisplay}</td>
          <td class="p-2 border-b border-gray-700">${a.tanggalKunjungan}</td>
          <td class="p-2 border-b border-gray-700">${a.aktifitas}</td>
          <td class="p-2 border-b border-gray-700">${statusFoto}</td>
        </tr>`;
      }).join('');
      
      c.innerHTML = `
        <div class="p-4">
            <h1 class="text-2xl font-bold mb-4">Daftar Aktifitas</h1>
            <table class="w-full text-left">
                <thead><tr><th>KONTAK</th><th>TOKO</th><th>PIC</th><th>TGL</th><th>AKTIFITAS</th><th>STATUS FOTO</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    // Pastikan halaman terpanggil saat load
    window.onload = async () => {
        const cloudData = await cloudGetAll();
        if (cloudData) {
            db.aktifitas = cloudData.aktifitas || [];
            db.toko = cloudData.toko || [];
            renderAktifitas(document.getElementById('app-content'));
        }
    };
  </script>

  <main id="app-content"></main>
</body>
</html>
